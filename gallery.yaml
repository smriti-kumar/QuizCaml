# Write a short, attention-grabbing description of your project.
desc: >
 Our project, QuizCaml, is a terminal-based comprehensive study tool. Users are able to
 add flashcards using pre-defined CSV files, or add them in the application. From there,
 they can flip through the flashcards, noting their confidence levels, play the matching
 game, or take an open-ended test. The user is also able to seamlessly switch between 
 multiple study sets. The user interface is easy to understand, with clear instructions 
 for the user every step of the way.